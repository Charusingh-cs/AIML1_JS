<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JavaScript Lab</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #e6e6e6;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* Card */
.container {
    background: #f9f9f9;
    padding: 40px;
    border-radius: 15px;
    box-shadow: 0px 8px 20px rgba(0,0,0,0.2);
    text-align: center;
    width: 600px;
}

/* Heading */
h1 {
    margin-bottom: 20px;
}

/* Input */
input {
    width: 60%;
    padding: 10px;
    margin-bottom: 20px;
}

/* Buttons */
button {
    background: #1976d2;
    color: white;
    border: none;
    padding: 10px 15px;
    margin: 5px;
    border-radius: 6px;
    cursor: pointer;
}

button:hover {
    background: #0d5bb5;
}

/* Paragraph */
p {
    margin-top: 20px;
    font-size: 16px;
}
</style>
</head>

<body>

<div class="container">

    <h1 id="mainheading">Welcome to JavaScript Lab</h1>

    <input type="text" id="userInput" placeholder="Enter new heading text">

    <br>

    <button id="changeTextBtn">Change Heading</button>
    <button id="bgCOLORBtn">Change Background</button>
    <button id="fontSizeBtn">Increase Font Size</button>
    <br>
    <button id="toggleBtn">Show/Hide Paragraph</button>
    <button id="resetBtn">Reset</button>

    <p id="paragraph">
        This is a sample paragraph. JavaScript events can dynamically change content.
    </p>

</div>

<script>

let heading = document.getElementById("mainheading");
let paragraph = document.getElementById("paragraph");
let input = document.getElementById("userInput");
let fontSize = 16;

// Change Heading
document.getElementById("changeTextBtn").addEventListener("click", function () {
    if (input.value !== "") {
        heading.innerText = input.value;
    }
});

// Change Background Colour
document.getElementById("bgCOLORBtn").onclick = function () {
    document.body.style.backgroundColor =
        "#" + Math.floor(Math.random() * 16777215).toString(16);
};

// Increase Font Size
document.getElementById("fontSizeBtn").addEventListener("click", function () {
    fontSize += 2;
    paragraph.style.fontSize = fontSize + "px";
});

// Show/Hide Paragraph
document.getElementById("toggleBtn").addEventListener("click", function () {
    if (paragraph.style.display === "none") {
        paragraph.style.display = "block";
    } else {
        paragraph.style.display = "none";
    }
});

// Reset
document.getElementById("resetBtn").addEventListener("click", function () {
    heading.innerText = "Welcome to JavaScript Lab";
    paragraph.style.display = "block";   // ✅ FIXED
    paragraph.style.fontSize = "16px";
    document.body.style.background = "#e6e6e6";
    input.value = "";
    fontSize = 16;
});

</script>

</body>
</html>
